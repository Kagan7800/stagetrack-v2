<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // OS v2.2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner-top"></div>

    <main id="pc-container">
        <div id="status-title">[SNTL_HARDWARE_INTERFACE]</div>

        <div class="btn-grid">
            <button class="control-btn b2-style" data-mode="b2"></button>
            <button class="control-btn" data-mode="scan">SCAN</button>
            <button class="control-btn" data-mode="status">STATUS</button>
            <button class="control-btn" data-mode="kid" data-kid="true">KID</button>
        </div>

        <div id="terminal-out"></div>
    </main>

    <script src="main.js" defer></script>
</body>
</html>
