<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // ENTERPRISE_STABLE</title>
    <style>
        /* 1. CRITICAL RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100vh; width: 100vw; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center;
        }

        /* 2. THE 'CONTEST FOUNDATION' CONTAINER */
        /* Reduced size to 'Visual Best Practice' (Handheld Terminal Ratio) */
        .app-shell {
            width: 100%;
            max-width: 450px; /* Management's preferred mobile-first width */
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* B1: TOP FOUNDATION (20% height) */
        .b1-frame {
            flex: 0 0 20%;
            background: url('b1-040426.svg') no-repeat center / contain;
            border-bottom: 2px solid #FFCE00;
        }

        /* B2: MAIN FOUNDATION (60% height) */
        .b2-frame {
            flex: 0 0 60%;
            background: url('b2-040426.svg') no-repeat center / contain;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
        }

        /* CONSOLE: FOOTER FOUNDATION (20% height) */
        .console-frame {
            flex: 0 0 20%;
            background: #080808;
            border-top: 1px solid #333;
            padding: 15px;
            color: #FFCE00;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.4;
        }

        .ui-row { display: flex; gap: 15px; width: 100%; }
        .btn {
            flex: 1;
            background: rgba(0,0,0,0.8);
            border: 1px solid #00E0FF;
            color: #00E0FF;
            padding: 15px 0;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="b1-frame"></div>
        <div class="b2-frame">
            <div class="ui-row">
                <button class="btn" onclick="sys('SCAN')">Scan</button>
                <button class="btn" onclick="sys('STATUS')">Status</button>
            </div>
        </div>
        <div class="console-frame" id="log">> OS_V5.1_STABLE<br>> CACHE_PURGE_COMPLETE</div>
    </div>

    <script>
        function sys(m) {
            const l = document.getElementById('log');
            l.innerHTML = `> ${m}_SEQUENCE_SUCCESS<br>` + l.innerHTML;
        }
    </script>
</body>
</html>
