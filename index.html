<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // OS v4.0.0</title>
    <style>
        :root {
            --neon: #00E0FF;
            --gold: #FFCE00;
            --bg: #000000;
            --border: #1a1a1a;
        }

        /* 1. LOCK THE VIEWPORT */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            overflow: hidden; /* Prevents unwanted scrolling */
            display: flex;
            justify-content: center;
        }

        /* 2. THE HARDWARE SHELL */
        .app-container {
            width: 100%;
            max-width: 500px; /* Limits width on desktop, full width on mobile */
            height: 100vh;
            display: grid;
            grid-template-rows: 15vh 1fr 120px; /* Header, Body, Console */
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* 3. SECTION A: THE TOP BANNER */
        .b1-header {
            background: #000 url('b1-040426.svg') no-repeat center;
            background-size: contain;
            border-bottom: 2px solid var(--gold);
        }

        /* 4. SECTION B: THE INTERACTIVE CORE (B2) */
        .core-interface {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
            overflow-y: auto; /* Future-proofing: Only this part scrolls if you add many buttons */
        }

        .b2-graphic {
            width: 100%;
            height: 200px; /* Fixed height for the main visual */
            background: #000 url('b2-040426.svg') no-repeat center;
            background-size: contain;
            border: 1px solid var(--border);
        }

        .button-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--neon);
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--neon);
            background: rgba(0, 224, 255, 0.05);
        }

        /* 5. SECTION C: THE SYSTEM CONSOLE */
        .console-footer {
            background: #050505;
            border-top: 1px solid var(--border);
            padding: 10px;
            font-size: 10px;
            color: var(--gold);
        }

        .console-line { margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="b1-header"></header>

        <main class="core-interface">
            <div class="b2-graphic"></div>
            
            <div class="button-grid">
                <button class="btn" onclick="sysLog('SCAN')">Scan</button>
                <button class="btn" onclick="sysLog('STATUS')">Status</button>
                </div>
        </main>

        <footer class="console-footer" id="output">
            <div class="console-line">> SYSTEM_READY_V4.0.0</div>
            <div class="console-line">> STANDBY_MODE_ACTIVE</div>
        </footer>
    </div>

    <script>
        function sysLog(msg) {
            const out = document.getElementById('output');
            const entry = document.createElement('div');
            entry.className = 'console-line';
            entry.innerText = `> ${msg}_OK`;
            out.prepend(entry);
        }
    </script>
</body>
</html>
