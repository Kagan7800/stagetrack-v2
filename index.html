<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // FULL_INTERFACE</title>
    <style>
        /* 1. LOCK THE VIEWPORT */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; /* Stops that "scrolling" broken look */
            background: #0b2fa3;
        }

        /* 2. THE COMPLETE INTERFACE SKIN */
        .app-skin {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* This makes the image the actual wallpaper of the app */
            background: url('layout.svg') no-repeat center center;
            background-size: cover; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Keeps buttons over the graphics */
            align-items: center;
            padding-bottom: 60px;
        }

        /* 3. THE BUTTONS */
        .btn-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            background: #ff2a2a; border: 4px solid #fff; border-radius: 50px;
            color: #fff; padding: 15px 40px; font-family: 'Arial Black', sans-serif;
            font-size: 20px; cursor: pointer; box-shadow: 0 6px 0 #8b0000;
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8b0000; }
    </style>
</head>
<body>

    <div class="app-skin">
        <div class="btn-group">
            <button class="btn" onclick="alert('START')">PLAY</button>
            <button class="btn" onclick="alert('STOP')">STOP</button>
        </div>
    </div>

</body>
</html>
