<style>
    /* 1. VIEWPORT LOCKING */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { 
        height: 100vh; width: 100vw; 
        overflow: hidden; 
        background: url('layout.svg') no-repeat center center fixed;
        background-size: cover;
        background-color: #0b2fa3; 
        font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* 2. TOP BANNER (Clearance for Music Fun Marquee) */
    .top-banner {
        height: 18vh;
        width: 100%;
    }

    /* 3. MODULAR GRID (Rule 4.1: Sidebars 15%, Center 70%) */
    .grid-layout {
        display: grid;
        grid-template-columns: 15% 70% 15%;
        grid-template-rows: repeat(8, 1fr);
        height: 82vh;
        gap: 12px;
        padding: 0 20px 20px 20px;
    }

    /* 4. CONTAINER MODULES */
    .tile {
        background: rgba(0, 0, 0, 0.82);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 900;
        font-size: 11px;
        transition: all 0.3s ease;
    }

    /* PC MODULE (Rule 3.1: The 16:9 Anchor) */
    .pc-tile {
        grid-column: 2;
        grid-row: 1 / span 8; /* Spans all rows to maximize size */
        width: 100%;
        height: 100%;
        max-height: 100%;
        aspect-ratio: 16 / 9;
        background: rgba(0, 0, 0, 0.95);
        border: 3px solid #ffffff;
        box-shadow: 0 0 60px rgba(0,0,0,0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        /* Remove margin: auto to prevent shrinking */
    }

    /* IC & SIDE TILE ADJUSTMENTS */
    .ic-tile { border: 2px solid #ffd700; color: #ffd700; }
    
    /* Ensure Guest Containers don't stretch too tall */
    .grid-layout > .tile:not(.pc-tile) {
        max-height: 90px;
        align-self: center;
    }
</style>
