<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X OS</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: var(--bg);
            font-family: sans-serif;
            overflow: hidden;
        }
        .stage {
            min-height: 100vh;
            width: 100%;
            display: grid;
            place-items: center;
            padding: 16px;
            box-sizing: border-box;
        }
        .system-wrapper {
            width: min(420px, 100%);
            background: #000;
            border: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
        }
        /* Keep existing styles for neon/gold, b1 header svg, b2 svg, grid, button styles, console styles */
    </style>
</head>
<body>
    <div class="b1-header">
        <svg><!-- b1 header SVG content here --></svg>
    </div>
    <div class="ui-content">
        <label for="status">Status:</label>
        <div class="b2-area">
            <button class="scan-btn">SCAN</button>
            <button class="status-btn">STATUS</button>
        </div>
        <div class="console">
            <!-- Console output here -->
        </div>
    </div>
    <script>
        function log() {
            // Log function implementation here
        }
    </script>
</body>
</html>
