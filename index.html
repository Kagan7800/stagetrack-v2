<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // OS v3.3.0</title>
    <style>
        :root { --neon: #00E0FF; --gold: #FFCE00; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: monospace;
            overflow: hidden; /* Prevents all scrolling */
        }

        /* TOP SECTION - 40% of screen */
        .b1-container {
            flex: 4; 
            width: 100%;
            background: url('b1-040426.svg') no-repeat center;
            background-size: contain; /* Shows full image without cropping */
            border-bottom: 1px solid var(--gold);
        }

        /* BOTTOM SECTION - 60% of screen */
        .ui-main {
            flex: 6;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            background: #000;
        }

        /* B2 IMAGE - Scaled inside the bottom section */
        .b2-graphic {
            width: 100%;
            max-width: 400px;
            height: 40%; /* Relative to the bottom section */
            background: url('b2-040426.svg') no-repeat center;
            background-size: contain;
            margin-bottom: 15px;
        }

        .controls {
            width: 100%;
            max-width: 320px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--neon);
            padding: 12px 0;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #console {
            width: 100%;
            max-width: 320px;
            margin-top: 15px;
            color: var(--gold);
            font-size: 10px;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="b1-container"></div>

    <div class="ui-main">
        <div class="b2-graphic"></div>
        
        <div class="controls">
            <button class="btn" onclick="log('SCAN')">SCAN</button>
            <button class="btn" onclick="log('STATUS')">STATUS</button>
        </div>

        <div id="console">> SYSTEM_REBOOT_COMPLETE...</div>
    </div>

    <script>
        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML = `> ${m}_SEQUENCE_INITIATED<br>` + c.innerHTML;
        }
    </script>
</body>
</html>
