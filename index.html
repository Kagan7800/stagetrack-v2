<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // SYSTEM_V6.0</title>
    <style>
        /* 1. NUKE THE BOX MODEL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100vh;
            width: 100vw;
            background: #000;
            overflow: hidden; /* NO SCROLLBARS ALLOWED */
            display: flex;
            flex-direction: column;
        }

        /* 2. THE 3-SLOT ARCHITECTURE */
        .header-slot {
            flex: 0 0 18vh; /* Fixed 18% of screen */
            border-bottom: 1px solid #FFCE00;
        }

        .main-slot {
            flex: 1; /* Takes exactly what is left (approx 62%) */
            position: relative;
            background: #050505;
        }

        .footer-slot {
            flex: 0 0 20vh; /* Fixed 20% of screen */
            background: #0a0a0a;
            border-top: 1px solid #222;
            padding: 15px;
            color: #FFCE00;
            font-family: monospace;
            font-size: 11px;
        }

        /* 3. THE FORCE-FIT ASSETS */
        .stage-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Keeps shapes perfect; change to 'fill' to stretch */
        }

        /* 4. FLOATING UI (Sits on top of B2) */
        .ui-layer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00E0FF;
            color: #00E0FF;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-slot">
        <img src="b1-040426.svg" class="stage-img" alt="B1">
    </div>

    <div class="main-slot">
        <img src="b2-040426.svg" class="stage-img" alt="B2">
        <div class="ui-layer">
            <button class="btn" onclick="log('SCAN')">Scan</button>
            <button class="btn" onclick="log('STATUS')">Status</button>
        </div>
    </div>

    <div class="footer-slot" id="console">
        > SYSTEM_LINK_V6.0_STABLE<br>
        > FOUNDATION_CONFORMITY_CHECK: PASS
    </div>

    <script>
        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML = `> ${m}_SEQUENCE_OK<br>` + c.innerHTML;
        }
    </script>
</body>
</html>
