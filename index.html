<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // FORCE_RENDER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background: #000; }

        .screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 20% */
        .top { flex: 0 0 20vh; border-bottom: 2px solid #FFCE00; }
        
        /* Mid 60% */
        .mid { flex: 0 0 60vh; position: relative; }
        
        /* Bottom 20% */
        .bot { flex: 0 0 20vh; background: #080808; border-top: 1px solid #333; padding: 15px; color: #FFCE00; font-family: monospace; }

        /* Force images to fill their boxes exactly */
        img { width: 100%; height: 100%; object-fit: fill; display: block; }

        .ui {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px;
        }
        .btn {
            background: rgba(0,0,0,0.8); border: 1px solid #00E0FF;
            color: #00E0FF; padding: 15px 30px; cursor: pointer; font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="top">
            <img src="b1-040426.svg" alt="header">
        </div>
        
        <div class="mid">
            <img src="b2-040426.svg" alt="main">
            <div class="ui">
                <button class="btn" onclick="alert('SCAN')">SCAN</button>
                <button class="btn" onclick="alert('STATUS')">STATUS</button>
            </div>
        </div>

        <div class="bot" id="log">> HARD_RENDER_ACTIVE_V5.0</div>
    </div>
</body>
</html>
