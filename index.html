<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // FINAL PROD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }

        /* HEADER: Fixed to top */
        .header {
            position: absolute; top: 0; left: 0; width: 100%; height: 20%;
            background: url('b1-040426.svg') no-repeat center / contain;
            border-bottom: 1px solid #FFCE00;
        }

        /* CENTER: The Main Visual */
        .main {
            position: absolute; top: 20%; left: 0; width: 100%; height: 60%;
            background: url('b2-040426.svg') no-repeat center / contain;
        }

        /* UI BUTTONS: Centered at the bottom of the main area */
        .controls {
            position: absolute; bottom: 25%; width: 100%;
            display: flex; justify-content: center; gap: 20px;
        }

        .btn {
            background: rgba(0,0,0,0.9); border: 1px solid #00E0FF;
            color: #00E0FF; padding: 10px 30px; font-family: monospace;
            cursor: pointer; font-weight: bold;
        }

        /* CONSOLE: Fixed to bottom */
        .console {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20%;
            background: #050505; border-top: 1px solid #222;
            padding: 15px; color: #FFCE00; font-family: monospace; font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header"></div>
    <div class="main"></div>
    <div class="controls">
        <button class="btn" onclick="alert('SCANNING')">SCAN</button>
        <button class="btn" onclick="alert('STATUS: OK')">STATUS</button>
    </div>
    <div class="console">> SYSTEM_STABLE_V4.3<br>> ALL_SYSTEMS_OPERATIONAL</div>
</body>
</html>
