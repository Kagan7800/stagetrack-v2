<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // PRODUCTION</title>
    <style>
        /* FORCE LAYOUT BASICS */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #0b2fa3; /* Immediate blue visual confirmation */
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .master-container {
            width: 100%; height: 100%;
            max-width: 500px; /* Mobile aspect lock */
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* SVG BACKGROUND LAYER */
        .svg-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        /* UI LAYER (Buttons) */
        .ui-layer {
            position: absolute; bottom: 10%; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            z-index: 10;
        }

        .btn {
            background: #ff2a2a; border: 4px solid #fff; border-radius: 50px;
            color: #fff; padding: 15px 35px; font-family: sans-serif;
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #8b0000;
        }
    </style>
</head>
<body>
    <div class="master-container">
        <div class="svg-layer">
            <svg viewBox="0 0 1920 1600" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
                <rect width="1920" height="1600" fill="#0b2fa3" />
                <g opacity="0.2">
                    <rect x="-400" width="400" height="2000" fill="#7a3bd1" transform="rotate(-45)" />
                    <rect x="400" width="400" height="2000" fill="#7a3bd1" transform="rotate(-45)" />
                </g>
                <circle cx="200" cy="150" r="18" fill="#ffd93b" />
                <circle cx="900" cy="200" r="20" fill="#ffd93b" />
                <g transform="translate(0, 1080)">
                    <rect x="160" width="1600" height="450" rx="40" fill="#1e90ff" stroke="#ff4d4d" stroke-width="20" />
                    <text x="960" y="200" font-family="Arial Black" font-size="140" fill="#ff2a2a" text-anchor="middle">Music Fun</text>
                </g>
            </svg>
        </div>

        <div class="ui-layer">
            <button class="btn" onclick="alert('Playing')">PLAY</button>
            <button class="btn" onclick="alert('Stopped')">STOP</button>
        </div>
    </div>
</body>
</html>
