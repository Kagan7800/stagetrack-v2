<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // FULL_BOX_LAYOUT</title>
    <link rel="icon" type="image/svg+xml" href="layout.svg">
    <style>
        /* SAFEGUARD #1 & #2: VIEWPORT LOCKING & SAFETY NET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background-color: #0b2fa3; 
        }

        .app-wallpaper {
            position: absolute;
            inset: 0;
            background: url('layout.svg') no-repeat center center;
            background-size: cover; 
            z-index: 0;
        }

        /* SAFEGUARD #3: ABSOLUTE UI LAYERING */
        .side-box {
            position: absolute;
            /* Starts exactly at the 0px line of your content area */
            top: 22vh; 
            height: 78vh; 
            width: 50px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toolbox-left { 
            left: 0; 
            border-left: none;
            border-radius: 0 12px 0 0; 
        }

        .chat-right { 
            right: 0; 
            border-right: none;
            border-radius: 12px 0 0 0; 
        }

        .vertical-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            color: white;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 3px;
            font-size: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="app-wallpaper"></div>

    <div class="side-box toolbox-left">
        <div class="vertical-label">Toolbox</div>
    </div>

    <div class="side-box chat-right">
        <div class="vertical-label">Chat</div>
    </div>

</body>
</html>
