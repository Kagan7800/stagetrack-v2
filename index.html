<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // STUDIO_v2</title>
    <style>
        /* PILLAR 1: VIEWPORT LOCK */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background-color: #0b2fa3; /* Safety Net */
        }

        .stage-background {
            position: fixed;
            inset: 0;
            background: url('layout.svg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* PILLAR 2: THE 3-COLUMN MODULAR ENGINE */
        .grid-layout {
            position: relative;
            z-index: 10;
            display: grid;
            /* Sidebars (1fr) | PC Anchor (4fr) | Sidebars (1fr) */
            grid-template-columns: 1fr 4fr 1fr;
            grid-template-rows: repeat(8, 1fr);
            height: 82vh; /* FORCES VISIBILITY */
            margin-top: 18vh; /* CLEARANCE FOR MARQUEE */
            gap: 12px;
            padding: 10px 20px;
        }

        /* PILLAR 3: CONTAINER ENFORCEMENT */
        .tile {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-weight: 900;
            font-size: 10px;
            min-height: 45px; /* PREVENTS VANISHING */
        }

        /* THE PC ANCHOR (Rule 3.1 & 4.5) */
        .pc-tile {
            grid-column: 2;
            grid-row: 2 / span 6; /* Vertically centered */
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffffff;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            margin: auto;
            font-size: 24px;
        }

        .ic-tile { border: 2px solid #ffd700; color: #ffd700; }
    </style>
</head>
<body>

    <div class="stage-background"></div>

    <div class="grid-layout">
        <div class="tile ic-tile" style="grid-column: 1; grid-row: 1;">IC</div>
        <div class="tile" style="grid-column: 1; grid-row: 2;">GC1</div>
        <div class="tile" style="grid-column: 1; grid-row: 3;">GC2</div>
        <div class="tile" style="grid-column: 1; grid-row: 4;">GC3</div>
        <div class="tile" style="grid-column: 1; grid-row: 5;">GC4</div>
        <div class="tile" style="grid-column: 1; grid-row: 6;">GC5</div>
        <div class="tile" style="grid-column: 1; grid-row: 7;">GC6</div>
        <div class="tile" style="grid-column: 1; grid-row: 8;">GC7</div>

        <div class="tile pc-tile">PC (16:9)</div>

        <div class="tile" style="grid-column: 3; grid-row: 1;">GC8</div>
        <div class="tile" style="grid-column: 3; grid-row: 2;">GC9</div>
        <div class="tile" style="grid-column: 3; grid-row: 3;">GC10</div>
        <div class="tile" style="grid-column: 3; grid-row: 4;">GC11</div>
        <div class="tile" style="grid-column: 3; grid-row: 5;">GC12</div>
        <div class="tile" style="grid-column: 3; grid-row: 6;">GC13</div>
        <div class="tile" style="grid-column: 3; grid-row: 7;">GC14</div>
    </div>

</body>
</html>
