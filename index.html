<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // CLEAN_INTERFACE</title>
    <style>
        /* 1. SAFEGUARD: THE INVISIBLE SAFETY NET */
        /* We set the background color to match the SVG's primary blue #0b2fa3 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background-color: #0b2fa3; 
        }

        /* 2. SAFEGUARD: VIEWPORT UNIT LOCKING */
        /* Pins the layout.svg to the glass of the screen (no islands/gaps) */
        .app-wallpaper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('layout.svg') no-repeat center center;
            background-size: cover; 
            z-index: 0;
        }

        /* 3. SAFEGUARD: ABSOLUTE UI LAYERING */
        /* This layer remains ready for future functional elements without 
           disturbing the background wallpaper flow */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-wallpaper"></div>

    <div class="ui-layer"></div>

</body>
</html>
