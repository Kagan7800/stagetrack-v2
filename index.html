<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // CRITICAL_FIX</title>
    <style>
        /* 1. Nuke all browser defaults */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #000; 
        }

        /* 2. Create the 3-Layer Stack */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* B1: Top 20% */
        .b1-layer {
            flex: 0 0 20vh;
            width: 100%;
            background: url('b1-040426.svg') no-repeat center;
            background-size: 100% 100%; /* FORCED STRETCH TO FILL BLOCK */
            border-bottom: 2px solid #FFCE00;
        }

        /* B2: Middle 60% */
        .b2-layer {
            flex: 0 0 60vh;
            width: 100%;
            background: url('b2-040426.svg') no-repeat center;
            background-size: 100% 100%; /* FORCED STRETCH TO FILL BLOCK */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5vh;
        }

        /* CONSOLE: Bottom 20% */
        .console-layer {
            flex: 0 0 20vh;
            width: 100%;
            background: #050505;
            color: #FFCE00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 15px;
            border-top: 1px solid #333;
            overflow-y: auto;
        }

        /* INTERACTIVE BUTTONS */
        .ui-btns { display: flex; gap: 20px; z-index: 10; }
        .btn {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00E0FF;
            color: #00E0FF;
            padding: 15px 30px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="b1-layer"></div>
        
        <div class="b2-layer">
            <div class="ui-btns">
                <button class="btn" onclick="add('SCAN')">SCAN</button>
                <button class="btn" onclick="add('STATUS')">STATUS</button>
            </div>
        </div>

        <div class="console-layer" id="log">> SYSTEM_RECOVERY_MODE_V4.4</div>
    </div>

    <script>
        function add(m) {
            const l = document.getElementById('log');
            l.innerHTML = `> ${m}_EXE_SUCCESS<br>` + l.innerHTML;
        }
    </script>
</body>
</html>
