<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // STUDIO_RCIP_v3</title>
    <style>
        /* 1. CORE ARCHITECTURE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background: #0b2fa3 url('layout.svg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
        }

        /* 2. TOP BANNER CLEARANCE (Protects the Marquee) */
        .top-banner {
            height: 20vh; /* Increased slightly to clear the marquee light-bulbs */
            width: 100%;
        }

        /* 3. THE 3-COLUMN MODULAR GRID (RCIP Adjusted Proportions) */
        .grid-layout {
            display: grid;
            /* Sidebar: 20% | Center Stage: 60% | Sidebar: 20% */
            grid-template-columns: 20% 60% 20%;
            grid-template-rows: repeat(8, 1fr);
            height: 80vh;
            gap: 12px;
            padding: 0 30px 20px 30px;
        }

        /* 4. CONTAINER MODULES (GC / PEO) */
        .tile {
            background: rgba(0, 0, 0, 0.9); /* Darker for better contrast */
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px; /* Matching the rounded pill look from spreadsheet */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 1px;
            height: 32px; /* Standardizing the "Pill" height */
            align-self: center;
        }

        /* 5. THE PC ANCHOR (Presentation Container) */
        .pc-tile {
            grid-column: 2;
            grid-row: 1 / span 8; 
            background: none; border: none; backdrop-filter: none; /* Strip tile defaults */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pc-screen {
            width: 100%;
            max-width: 900px; /* Constrains 16:9 to reasonable scale */
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffffff;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        /* 6. SPECIALIZED CONTAINERS */
        .ic-tile { 
            border: 2px solid #ffd700; /* Instructor Gold */
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

    </style>
</head>
<body>

    <div class="top-banner"></div>

    <div class="grid-layout">
        <div class="tile ic-tile" style="grid-column: 1; grid-row: 1;">IC</div>
        <div class="tile" style="grid-column: 1; grid-row: 2;">GC1</div>
        <div class="tile" style="grid-column: 1; grid-row: 3;">GC2</div>
        <div class="tile" style="grid-column: 1; grid-row: 4;">GC3</div>
        <div class="tile" style="grid-column: 1; grid-row: 5;">GC4</div>
        <div class="tile" style="grid-column: 1; grid-row: 6;">GC5</div>
        <div class="tile" style="grid-column: 1; grid-row: 7;">GC6</div>
        <div class="tile" style="grid-column: 1; grid-row: 8;">GC7</div>

        <div class="pc-tile">
            <div class="pc-screen">PC (16:9)</div>
        </div>

        <div class="tile" style="grid-column: 3; grid-row: 1;">GC8</div>
        <div class="tile" style="grid-column: 3; grid-row: 2;">GC9</div>
        <div class="tile" style="grid-column: 3; grid-row: 3;">GC10</div>
        <div class="tile" style="grid-column: 3; grid-row: 4;">GC11</div>
        <div class="tile" style="grid-column: 3; grid-row: 5;">GC12</div>
        <div class="tile" style="grid-column: 3; grid-row: 6;">GC13</div>
        <div class="tile" style="grid-column: 3; grid-row: 7;">GC14</div>
    </div>

</body>
</html>
