<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // OS v2.3.2</title>
    <link rel="stylesheet" href="style.css?v=0404b">
</head>
<body>
    <div class="b1-header"></div>

    <main class="ui-frame">
        <div class="ui-label">[SNTL_HARDWARE_INTERFACE]</div>
        
        <div class="ui-grid">
            <button class="b2-svg-btn" onclick="execute('B2')"></button>
            
            <button class="std-btn" onclick="execute('SCAN')">SCAN</button>
            <button class="std-btn" onclick="execute('STATUS')">STATUS</button>
        </div>

        <div id="ui-console">> SYSTEM_READY_040426</div>
    </main>

    <script>
        const log = document.getElementById('ui-console');
        function execute(c) {
            const e = document.createElement('div');
            e.innerText = `> ${c}_OK`;
            log.prepend(e);
        }
    </script>
</body>
</html>
