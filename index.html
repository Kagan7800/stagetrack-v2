<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // PRO_STUDIO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background: #0b2fa3; 
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #stage-master {
            display: grid;
            /* Sidebars: 12% | Center: 1fr | Sidebars: 12% */
            grid-template-columns: 12% 1fr 1fr 1fr 12%;
            /* ROW MAP: 
               1: Banner(15vh) 
               2: Top Pills(40px) 
               3: GAP(20px) 
               4-6: PC Center 
               7: GAP(20px) 
               8: Bottom Pills(40px) 
            */
            grid-template-rows: 15vh 40px 20px 1fr 1fr 1fr 20px 40px;
            height: 100vh;
            width: 100vw;
            padding: 10px 20px;
        }

        .peo {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 11px;
            height: 32px;
            width: 85%;
            margin: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #pc-anchor {
            grid-column: 2 / span 3;
            grid-row: 4 / span 3; /* Moved down to Row 4 to clear the gap */
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            width: 100%;
            height: 100%;
            aspect-ratio: 16 / 9;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .ic { border: 2px solid #ffcc00; color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
    </style>
</head>
<body>

    <div id="stage-master">
        <div class="peo" style="grid-column: 2; grid-row: 2;">GC4</div>
        <div class="peo" style="grid-column: 3; grid-row: 2;">GC5</div>
        <div class="peo" style="grid-column: 4; grid-row: 2;">GC6</div>

        <div class="peo ic" style="grid-column: 1; grid-row: 4;">IC</div>
        <div class="peo" style="grid-column: 1; grid-row: 5;">GC1</div>
        <div class="peo" style="grid-column: 1; grid-row: 6;">GC2</div>
        <div class="peo" style="grid-column: 1; grid-row: 7;">GC3</div>

        <div id="pc-anchor">PC (16:9)</div>

        <div class="peo" style="grid-column: 5; grid-row: 4;">GC10</div>
        <div class="peo" style="grid-column: 5; grid-row: 5;">GC11</div>
        <div class="peo" style="grid-column: 5; grid-row: 6;">GC12</div>
        <div class="peo" style="grid-column: 5; grid-row: 7;">GC13</div>

        <div class="peo" style="grid-column: 2; grid-row: 8;">GC7</div>
        <div class="peo" style="grid-column: 3; grid-row: 8;">GC8</div>
        <div class="peo" style="grid-column: 4; grid-row: 8;">GC9</div>
    </div>

</body>
</html>
