<style>
    /* ... existing body and banner styles ... */

    .grid-layout {
        display: grid;
        /* Sidebar (15%) | Center (70%) | Sidebar (15%) */
        grid-template-columns: 15% 70% 15%;
        grid-template-rows: repeat(8, 1fr);
        height: 82vh;
        gap: 10px;
        padding: 0 20px 20px 20px;
    }

    .tile {
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 900;
    }

    /* THE FIX: Force PC to fill the 70% width and maintain 16:9 */
    .pc-tile {
        grid-column: 2;
        grid-row: 1 / span 8; 
        width: 100%; /* Force width to fill the 70% column */
        max-width: 1100px; /* Prevents it from getting absurdly huge on ultrawides */
        aspect-ratio: 16 / 9;
        background: rgba(0, 0, 0, 0.95);
        border: 3px solid #ffffff;
        box-shadow: 0 0 50px rgba(0,0,0,0.9);
        margin: auto; /* Vertically centers the 16:9 box in the 8-row grid */
        font-size: 32px;
    }

    /* Keep sidebars consistent */
    .grid-layout > .tile:not(.pc-tile) {
        height: 90%;
        max-height: 85px;
        align-self: center;
    }
</style>
