<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SNTL-X // RECONSTRUCTION_V1</title>
    <style>
        /* 1. ARCHITECTURAL RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background: #0b2fa3; /* Background Moat */
            font-family: sans-serif;
        }

        /* 2. EXPLICIT GRID (5 Columns / 7 Rows) */
        #master-stage {
            display: grid;
            /* Sidebars: 15% | Center Columns (3 equal parts) | Sidebars: 15% */
            grid-template-columns: 15% 1fr 1fr 1fr 15%;
            /* Row 1: Top Margin | Row 2: Top GCs | Row 3-5: Center Space | Row 6: Bottom GCs | Row 7: Footer */
            grid-template-rows: 15vh 40px 1fr 1fr 1fr 40px 5vh;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            gap: 10px;
        }

        /* 3. PEO PILL MODULES (Explicitly Sized) */
        .pill {
            background: #000;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            height: 30px;
            width: 80%;
            margin: auto;
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4. THE PC (50% CENTER LOCK) */
        #pc-container {
            grid-column: 2 / span 3;
            grid-row: 3 / span 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pc-box {
            width: 50%; /* 50% Size as requested */
            aspect-ratio: 16 / 9;
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .gold { border-color: gold; color: gold; }
    </style>
</head>
<body>

    <div id="master-stage">
        <div class="pill" style="grid-column: 2; grid-row: 2;">GC4</div>
        <div class="pill" style="grid-column: 3; grid-row: 2;">GC5</div>
        <div class="pill" style="grid-column: 4; grid-row: 2;">GC6</div>

        <div class="pill gold" style="grid-column: 1; grid-row: 3;">IC</div>
        <div class="pill" style="grid-column: 1; grid-row: 4;">GC1</div>
        <div class="pill" style="grid-column: 1; grid-row: 5;">GC2</div>

        <div id="pc-container">
            <div class="pc-box"></div>
        </div>

        <div class="pill" style="grid-column: 5; grid-row: 3;">GC10</div>
        <div class="pill" style="grid-column: 5; grid-row: 4;">GC11</div>
        <div class="pill" style="grid-column: 5; grid-row: 5;">GC12</div>

        <div class="pill" style="grid-column: 2; grid-row: 6;">GC7</div>
        <div class="pill" style="grid-column: 3; grid-row: 6;">GC8</div>
        <div class="pill" style="grid-column: 4; grid-row: 6;">GC9</div>
    </div>

</body>
</html>
