<style>
    /* 1. SYSTEM OVERVIEW: Viewport & Safety Net */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { 
        height: 100vh; width: 100vw; 
        overflow: hidden; 
        background: url('layout.svg') no-repeat center center fixed;
        background-size: cover;
        background-color: #0b2fa3; 
        font-family: sans-serif;
    }

    /* 2. TOP BANNER MODULE (Matches Marquee Height) */
    .top-banner {
        height: 20vh;
        width: 100%;
    }

    /* 3. THE 3-COLUMN MODULAR GRID (Corrected Proportions) */
    .grid-layout {
        display: grid;
        /* Sidebar (15%) | Center (70%) | Sidebar (15%) */
        grid-template-columns: 15% 70% 15%;
        grid-template-rows: repeat(8, 1fr);
        height: 80vh;
        gap: 10px;
        padding: 0 20px 20px 20px;
        z-index: 10;
    }

    /* 4. CONTAINER MODULES */
    .tile {
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 900;
        font-size: 11px;
        text-align: center;
    }

    /* PC MODULE (The "Big Box" Fix) */
    .pc-tile {
        grid-column: 2;
        grid-row: 1 / span 8; /* Occupy all available vertical space in center */
        width: 95%;
        height: 95%;
        aspect-ratio: 16 / 9;
        background: rgba(0, 0, 0, 0.95);
        border: 3px solid #ffffff;
        box-shadow: 0 0 50px rgba(0,0,0,0.9);
        margin: auto; /* Keeps 16:9 centered in the 70% width */
        font-size: 32px;
    }

    /* IC & GC STYLING */
    .ic-tile { border: 2px solid #ffd700; color: #ffd700; }
    
    /* Ensure side tiles don't get too tall */
    .grid-layout > .tile:not(.pc-tile) {
        max-height: 80px; 
    }
</style>
