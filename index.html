<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // STAGE_LAYOUT</title>
    <link rel="icon" type="image/svg+xml" href="layout.svg">
    <style>
        /* SAFEGUARD #1 & #2: VIEWPORT LOCKING & SAFETY NET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background-color: #0b2fa3; 
        }

        .app-wallpaper {
            position: absolute;
            inset: 0;
            background: url('layout.svg') no-repeat center center;
            background-size: cover; 
            z-index: 0;
        }

        /* SAFEGUARD #3: ABSOLUTE UI LAYERING */
        /* The Stage Container starts below the banner (22vh) */
        .stage-area {
            position: absolute;
            top: 22vh;
            left: 0;
            width: 100%;
            height: 78vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        /* PEO: THE PEOPLE WRAPPER (Outer Ring) */
        .peo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed rgba(255,255,255,0.3);
            padding: 40px;
            border-radius: 20px;
            position: relative;
        }
        .peo-label {
            position: absolute;
            top: -10px;
            background: #000;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            font-weight: bold;
        }

        /* PC: THE PRESENTATION (Center Focus) */
        .pc-main {
            width: 60vw;
            height: 40vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-wallpaper"></div>

    <div class="stage-area">
        <div class="peo-container">
            <div class="peo-label">PEO (PEOPLE CONTAINERS)</div>
            
            <div class="pc-main">
                PC (PRESENTATION)
            </div>
        </div>
    </div>

</body>
</html>
