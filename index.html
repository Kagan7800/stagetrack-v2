<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // V5.0 OPTIMIZED</title>
    <style>
        /* 1. GLOBAL RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100vh;
            width: 100vw;
            background: #050505; /* Dark neutral background */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        /* 2. THE VISUAL FRAME (The "Reduced Size" Logic) */
        .viewport-frame {
            width: 95%;
            max-width: 450px; /* Professional 'Handheld' width */
            height: 90vh;      /* Leaves a clean margin at top/bottom */
            background: #000;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            position: relative;
        }

        /* 3. CONTEST FOUNDATION: B1 (Header) */
        .b1-header {
            flex: 0 0 15%; /* Takes exactly 15% of the frame */
            width: 100%;
            background: url('b1-040426.svg') no-repeat center;
            background-size: contain;
            border-bottom: 1px solid #FFCE00;
        }

        /* 4. CONTEST FOUNDATION: B2 (Main Visual) */
        .b2-main {
            flex: 1; /* Takes the remaining space */
            width: 100%;
            background: url('b2-040426.svg') no-repeat center;
            background-size: contain;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        /* 5. UI CONTROLS */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00E0FF;
            color: #00E0FF;
            padding: 12px 0;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn:hover {
            background: #00E0FF;
            color: #000;
        }

        /* 6. SYSTEM CONSOLE (Footer) */
        .status-footer {
            height: 80px;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 10px;
            color: #FFCE00;
            overflow-y: hidden;
        }
    </style>
</head>
<body>

    <div class="viewport-frame">
        
        <header class="b1-header"></header>

        <main class="b2-main">
            <div class="control-panel">
                <button class="btn" onclick="log('SCAN')">Scan</button>
                <button class="btn" onclick="log('STATUS')">Status</button>
            </div>
        </main>

        <footer class="status-footer" id="console">
            > SYSTEM_V5.0_STABLE<br>
            > READY_FOR_FEATURES
        </footer>

    </div>

    <script>
        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML = `> ${m}_INIT...<br>` + c.innerHTML;
        }
    </script>
</body>
</html>
