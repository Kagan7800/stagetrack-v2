<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // SFB_ARCHITECT</title>
    <style>
        /* 1. SYSTEM OVERVIEW & BACKGROUND MOAT */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background: #0b2fa3 url('./layout.svg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
        }

        /* 2. THE GRID ENGINE (5-Column Wrap) */
        #stage-master {
            display: grid;
            /* Sidebars(12.5%) | 3 Center Tracks | Sidebars(12.5%) */
            grid-template-columns: 12.5% 1fr 1fr 1fr 12.5%;
            /* Row Map: 
               1: Top Gap | 2: Top Pills | 3: PC Space | 4: Bottom Pills | 5: Bottom Gap */
            grid-template-rows: 16vh 45px 1fr 45px 4vh;
            height: 100vh;
            width: 100vw;
            padding: 0 30px; /* Forces background visibility on the sides */
            gap: 12px;
        }

        /* 3. PEO PILLS (People Containers) */
        .peo {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 10px;
            height: 34px; /* Hard-locked height to prevent squeezing */
            width: 90%;
            margin: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 4. THE PC ANCHOR (Center Stage) */
        #pc-anchor {
            grid-column: 2 / span 3;
            grid-row: 3; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pc-screen {
            width: 100%;
            max-height: 58vh; /* THE CLAMP: Prevents PC from crushing GCs */
            aspect-ratio: 16 / 9;
            background: #000;
            border: 2px solid #ffffff;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        /* 5. SPECIALIZED STATES */
        .ic { border: 2px solid #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="stage-master">
        <div class="peo" style="grid-column: 2; grid-row: 2;">GC4</div>
        <div class="peo" style="grid-column: 3; grid-row: 2;">GC5</div>
        <div class="peo" style="grid-column: 4; grid-row: 2;">GC6</div>

        <div class="peo ic" style="grid-column: 1; grid-row: 3; align-self: start; margin-top: 20px;">IC</div>
        <div class="peo" style="grid-column: 1; grid-row: 3; align-self: center;">GC1</div>
        <div class="peo" style="grid-column: 1; grid-row: 3; align-self: end; margin-bottom: 20px;">GC2</div>

        <div id="pc-anchor">
            <div class="pc-screen">PC (16:9)</div>
        </div>

        <div class="peo" style="grid-column: 5; grid-row: 3; align-self: start; margin-top: 20px;">GC10</div>
        <div class="peo" style="grid-column: 5; grid-row: 3; align-self: center;">GC11</div>
        <div class="peo" style="grid-column: 5; grid-row: 3; align-self: end; margin-bottom: 20px;">GC12</div>

        <div class="peo" style="grid-column: 2; grid-row: 4;">GC7</div>
        <div class="peo" style="grid-column: 3; grid-row: 4;">GC8</div>
        <div class="peo" style="grid-column: 4; grid-row: 4;">GC9</div>
    </div>

</body>
</html>
