<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // OS v3.1.0</title>
    <style>
        :root { 
            --neon: #00E0FF; 
            --gold: #FFCE00; 
            --bg: #020408; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center;     /* Centers vertically */
            min-height: 100vh;
            font-family: monospace;
            overflow: hidden;
        }

        /* THE MAIN CONTAINER: This controls the overall size */
        .system-wrapper {
            width: 90%;
            max-width: 360px; /* Reduced width for a sleeker look */
            background: #000;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* B1: TOP SECTION (REDUCED SIZE) */
        .b1-header {
            width: 100%;
            height: 100px; /* Shorter header */
            background: #000 url('b1-040426.svg') no-repeat center;
            background-size: contain;
            border-bottom: 1px solid var(--gold);
        }

        /* INTERFACE CONTENT */
        .ui-content {
            padding: 15px;
        }

        .label {
            color: var(--gold);
            font-size: 10px;
            text-align: center;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        /* B2: CENTER IMAGE (REDUCED SIZE) */
        .b2-area {
            width: 100%;
            height: 120px; /* Reduced height */
            background: #000 url('b2-040426.svg') no-repeat center;
            background-size: contain;
            border: 1px solid #222;
            margin-bottom: 15px;
        }

        /* BUTTONS */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--neon);
            padding: 12px 0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover {
            border-color: var(--neon);
            background: rgba(0, 224, 255, 0.05);
        }

        /* CONSOLE */
        #console {
            margin-top: 15px;
            height: 60px;
            font-size: 9px;
            color: var(--gold);
            border-top: 1px solid #222;
            padding-top: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="system-wrapper">
        <div class="b1-header"></div>
        
        <div class="ui-content">
            <div class="label">[HARDWARE_LINK_ACTIVE]</div>
            
            <div class="b2-area"></div>

            <div class="grid">
                <button class="btn" onclick="log('SCAN')">Scan</button>
                <button class="btn" onclick="log('STATUS')">Status</button>
            </div>

            <div id="console">> OS_V3.1.0_READY...</div>
        </div>
    </div>

    <script>
        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML = `> ${m}_INITIATED...<br>` + c.innerHTML;
        }
    </script>
</body>
</html>
