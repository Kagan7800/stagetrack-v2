<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNTL-X // OS v3.2.0</title>
    <style>
        :root { --neon: #00E0FF; --gold: #FFCE00; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            overflow: hidden;
        }

        /* 1. THE MINI-WRAPPER */
        .system-wrapper {
            width: 300px; /* Force small width */
            max-height: 90vh; /* Force it to stay within screen height */
            background: #000;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding-bottom: 10px;
        }

        /* 2. B1: HEADER (MINIMIZED) */
        .b1-header {
            width: 100%;
            height: 60px; /* Significantly reduced */
            background: #000 url('b1-040426.svg') no-repeat center;
            background-size: contain;
            border-bottom: 1px solid var(--gold);
        }

        .ui-content { padding: 10px; }

        .label {
            color: var(--gold);
            font-size: 8px;
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* 3. B2: CENTER IMAGE (MINIMIZED) */
        .b2-area {
            width: 100%;
            height: 70px; /* Significantly reduced */
            background: #000 url('b2-040426.svg') no-repeat center;
            background-size: contain;
            border: 1px solid #111;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--neon);
            padding: 8px 0;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover { border-color: var(--neon); }

        #console {
            margin-top: 8px;
            height: 40px;
            font-size: 9px;
            color: var(--gold);
            border-top: 1px solid #1a1a1a;
            padding-top: 5px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="system-wrapper">
        <div class="b1-header"></div>
        <div class="ui-content">
            <div class="label">SNTL_LINK_V3.2</div>
            <div class="b2-area"></div>
            <div class="grid">
                <button class="btn" onclick="log('SCAN')">SCAN</button>
                <button class="btn" onclick="log('STATUS')">STATUS</button>
            </div>
            <div id="console">> SYSTEM_READY</div>
        </div>
    </div>
    <script>
        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML = `> ${m}_OK<br>` + c.innerHTML;
        }
    </script>
</body>
</html>
