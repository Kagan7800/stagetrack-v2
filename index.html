<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Background Interface</title>
    <style>
        /* 1. Reset margins and fix height */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        /* 2. The Background Logic */
        body {
            /* REPLACE 'background.svg' WITH YOUR ACTUAL FILENAME */
            background-image: url('background.svg'); 
            
            /* 'contain' ensures the full image is always visible */
            background-size: contain; 
            
            /* 'no-repeat' stops the image from tiling */
            background-repeat: no-repeat; 
            
            /* 'center' keeps it in the middle of the screen */
            background-position: center; 
            
            /* 'fixed' keeps it from moving if you scroll */
            background-attachment: fixed; 
            
            /* Match this color to the edges of your image for a seamless look */
            background-color: #000000; 
            
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: monospace;
        }

        /* 3. Overlay Content (Optional UI Box) */
        .content-overlay {
            margin-top: 50px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7); /* Semi-transparent black */
            border: 1px solid #333;
            color: #00E0FF;
            text-align: center;
            width: 300px;
        }

    </style>
</head>
<body>

    <div class="content-overlay">
        <h2>INTERFACE ACTIVE</h2>
        <p>System Online</p>
    </div>

</body>
</html>
