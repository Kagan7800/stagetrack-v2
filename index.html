<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // CRITICAL_FIX</title>
    <style>
        /* 1. FORCE THE BACKGROUND TO BE BLUE (NO MORE WHITE) */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #0b2fa3 !important; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        /* 2. THE STAGE */
        .stage {
            width: 100%; height: 100%; max-width: 500px;
            position: relative; background: #0b2fa3;
        }
        /* 3. THE UI BUTTONS */
        .controls {
            position: absolute; bottom: 10%; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 100;
        }
        .btn {
            background: #ff2a2a; border: 4px solid #fff; border-radius: 50px;
            color: #fff; padding: 15px 35px; font-family: sans-serif;
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #8b0000;
        }
    </style>
</head>
<body>
    <div class="stage">
        <svg viewBox="0 0 1920 1600" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
            <rect width="1920" height="1600" fill="#0b2fa3" />
            <g opacity="0.2"><rect x="400" width="400" height="2000" fill="#7a3bd1" transform="rotate(-45)" /></g>
            <circle cx="200" cy="150" r="50" fill="#ffd93b" />
            <g transform="translate(0, 1000)">
                <rect x="160" width="1600" height="500" rx="40" fill="#1e90ff" stroke="#ff4d4d" stroke-width="20" />
                <text x="960" y="250" font-family="Arial Black" font-size="120" fill="#ffffff" text-anchor="middle">MUSIC FUN</text>
            </g>
        </svg>
        <div class="controls">
            <button class="btn" onclick="alert('PLAYING')">PLAY</button>
            <button class="btn" onclick="alert('STOPPED')">STOP</button>
        </div>
    </div>
</body>
</html>
