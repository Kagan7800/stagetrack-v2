<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNTL-X // MODULAR_STAGE</title>
    <style>
        /* SAFEGUARD #1 & #2: VIEWPORT LOCKING */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            background: url('layout.svg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0b2fa3; 
            font-family: sans-serif;
        }

        /* MODULE 1: TOP BANNER (0px Clearance) */
        .top-banner {
            height: 18vh;
            width: 100%;
        }

        /* MODULE 2: THE 3-COLUMN GRID (Rule 4.1) */
        .grid-layout {
            display: grid;
            /* LEFT (1fr) | CENTER (4fr) | RIGHT (1fr) */
            grid-template-columns: 1fr 4fr 1fr;
            grid-template-rows: repeat(8, 1fr);
            height: 82vh;
            gap: 12px;
            padding: 10px 20px;
        }

        /* CONTAINER MODULES */
        .tile {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 11px;
        }

        /* PC MODULE (Rule 3.1 & 4.5) */
        .pc-tile {
            grid-column: 2;
            grid-row: 2 / span 6; /* Centered vertically across 8 rows */
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            margin: auto; /* Forces 16:9 and absolute centering */
            font-size: 24px;
        }

        /* IC MODULE (Rule 3.2) */
        .ic-tile { border-color: #ffd700; color: #ffd700; }
    </style>
</head>
<body>

    <div class="top-banner"></div>

    <div class="grid-layout">
        <div class="tile ic-tile" style="grid-column: 1; grid-row: 1;">IC</div>
        <div class="tile" style="grid-column: 1; grid-row: 2;">GC1</div>
        <div class="tile" style="grid-column: 1; grid-row: 3;">GC2</div>
        <div class="tile" style="grid-column: 1; grid-row: 4;">GC3</div>
        <div class="tile" style="grid-column: 1; grid-row: 5;">GC4</div>
        <div class="tile" style="grid-column: 1; grid-row: 6;">GC5</div>
        <div class="tile" style="grid-column: 1; grid-row: 7;">GC6</div>
        <div class="tile" style="grid-column: 1; grid-row: 8;">GC7</div>

        <div class="pc-tile">PC (16:9)</div>

        <div class="tile" style="grid-column: 3; grid-row: 1;">GC8</div>
        <div class="tile" style="grid-column: 3; grid-row: 2;">GC9</div>
        <div class="tile" style="grid-column: 3; grid-row: 3;">GC10</div>
        <div class="tile" style="grid-column: 3; grid-row: 4;">GC11</div>
        <div class="tile" style="grid-column: 3; grid-row: 5;">GC12</div>
        <div class="tile" style="grid-column: 3; grid-row: 6;">GC13</div>
        <div class="tile" style="grid-column: 3; grid-row: 7;">GC14</div>
        </div>

</body>
</html>
